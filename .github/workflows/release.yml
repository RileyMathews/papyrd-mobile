name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

env:
  APP_VERSION: ${{ github.ref_name }}
  CI: true
  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

jobs:
  android-internal:
    name: Android Internal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.3"
          bundler-cache: true

      - name: Install SOPS
        run: |
          SOPS_VERSION=3.12.2
          curl -fsSL -o sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Deploy Android internal release
        run: bundle exec fastlane android internal

  ios-internal:
    name: iOS Internal
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.3"
          bundler-cache: true

      - name: Install SOPS
        run: |
          SOPS_VERSION=3.12.2
          curl -fsSL -o sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.darwin.amd64"
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Verify Xcode SDK
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Deploy iOS internal release
        run: bundle exec fastlane ios internal
