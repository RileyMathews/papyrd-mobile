name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

env:
  APP_VERSION: ${{ github.ref_name }}
  CI: true
  SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

jobs:
  android-closed:
    name: Android Closed Testing
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.3"
          bundler-cache: true

      - name: Install SOPS
        run: |
          SOPS_VERSION=3.12.2
          curl -fsSL -o sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Deploy Android closed testing release
        run: bundle exec fastlane android closed

      - name: Upload Android APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          apk_path="android/app/build/outputs/apk/release/app-release.apk"
          asset_tag="${GITHUB_REF_NAME//\//-}"

          test -f "$apk_path"
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" "$apk_path#Papyrd-${asset_tag}.apk"

  ios-internal:
    name: iOS Internal
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.3"
          bundler-cache: true

      - name: Install SOPS
        run: |
          SOPS_VERSION=3.12.2
          curl -fsSL -o sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.darwin.amd64"
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Verify Xcode SDK
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Deploy iOS internal release
        run: bundle exec fastlane ios internal
